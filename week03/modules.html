<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> JavaScript Modules Practice | WDD 231 </title>
    <meta name="description" content=" Practicing using JavaScript ES modules for WDD 231. ">
    <meta name="author" content=" Rafael Mendoza ">
    <link rel="stylesheet" href="styles/modules.css">
    <script type="module" src="scripts/modules.mjs"></script>
</head>
<body>
    <main>
        <h1 id="courseName"></h1>
        <h2 id="courseCode"></h2>

        <label for="sectionNumber"> Choose a section: </label>
        <select id="sectionNumber"></select>

        <button id="enrollStudent"> Enroll a Student </button>
        <button id="dropStudent"> Drop a Student </button>

        <table>
            <thead>
                <tr>
                    <th> Section </th>
                    <th> Enrolled </th>
                    <th> Instructor </th>
                </tr>
            </thead>
            <tbody id="sections"></tbody>
        </table>
    </main>
</body>
</html>
